<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">

  <!-- Red background -->
  <circle cx="50" cy="50" r="50" fill="#A50034"/>

  <!-- ── Inner arc (forms the G outline and "face" border) ───────────────
       Centre (52,52), radius 30.
       Sweeps clockwise ~310° — start at right (82,52), end at upper-right.
       Opening angle ≈ 50° (upper-right, ~310° SVG clockwise from 0°).
       End point: x=52+30·cos(-50°)=71.3, y=52+30·sin(-50°)=29.0
       large-arc-flag=1, sweep-flag=1 (clockwise)                          -->
  <path d="M 82 52 A 30 30 0 1 1 71.3 29"
        stroke="white" stroke-width="5" fill="none"
        stroke-linecap="round"/>

  <!-- ── G arm ── horizontal bar extending inward from right edge of arc -->
  <rect x="62" y="49.5" width="20" height="5" fill="white"/>

  <!-- ── Dot (the "nose" of the LG face design) -->
  <circle cx="32" cy="30" r="4" fill="white"/>

  <!-- ── L ──────────────────────────────────────────
       Vertical stroke + short horizontal base       -->
  <rect x="34" y="37" width="6"  height="26" fill="white"/>
  <rect x="34" y="57" width="18" height="6"  fill="white"/>

</svg>
